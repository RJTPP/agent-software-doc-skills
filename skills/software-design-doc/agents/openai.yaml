interface:
  display_name: "Software Design Doc"
  short_description: "Draft and review SDDs with an IEEE 1016-2009-inspired structure"
  default_prompt: "Use $software-design-doc to draft or review an SDD using an IEEE 1016-2009-inspired structure and pragmatic completeness checks. Use the template section order as default guidance, but prioritize clarity for the project context. Ensure explicit Architecture Overview, Viewpoint-to-View Mapping, and formal Design Element definitions. Use original wording and do not reproduce IEEE standard text. If a disclaimer is needed, keep it to one concise line. Choose mode (`draft+review`, `draft-only`, or `review-only`) from my request and write only the relevant outputs."
