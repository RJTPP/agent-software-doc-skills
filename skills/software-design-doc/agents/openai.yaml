interface:
  display_name: "Software Design Description"
  short_description: "Draft, review, and drift-check SDDs with an IEEE 1016-2009-inspired structure"
  default_prompt: "Use $software-design-doc to draft, review, or drift-check an SDD using an IEEE 1016-2009-inspired structure and pragmatic completeness checks. Use the canonical document set under `references/document-set/` as the default guidance, but prioritize clarity for the project context. Always include explicit Architecture Overview, Viewpoint-to-View Mapping, and formal Design Element definitions (including Inputs/Outputs/Public Functions). In the canonical `index.md`, keep document-set metadata including `Doc Baseline Commit` and `Last Reviewed On` when repository context is available. For quality-attribute scenarios and future-evolution notes, include them when relevant; if omitted, provide a concise N/A rationale. Use original wording and do not reproduce IEEE standard text. If a disclaimer is needed, keep it to one concise line. Choose mode (`draft+review`, `draft-only`, `review-only`, or `drift-check`) from my request and write only the relevant outputs. Keep canonical SDD files under `docs/sdd/`; write dated gap or drift artifacts under `.agent-doc-skills/sdd/`."
